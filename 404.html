<!DOCTYPE html>
<html class="light" lang="tr">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Sayfa Bulunamadı | Solut Enerji</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          "secondary-container": "#feb31b",
          "on-secondary-fixed": "#281800",
          "primary": "#002855",
          "on-primary": "#ffffff",
          "primary-fixed-dim": "#aac7ff",
          "background": "#f8f9fa",
          "on-surface": "#191c1d",
          "on-surface-variant": "#43474f",
          "secondary": "#7f5600",
        },
        fontFamily: { "headline": ["Manrope"], "body": ["Inter"] },
      }
    }
  }
</script>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; display: inline-block; vertical-align: middle; }
  .kinetic-monolith-gradient { background: linear-gradient(135deg, #002855 0%, #1d3e6e 100%); }
</style>
</head>
<body class="bg-background font-body text-on-surface antialiased">

<!-- Nav -->
<nav class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-md shadow-sm">
  <div class="flex justify-between items-center px-6 py-4 max-w-7xl mx-auto">
    <a href="/" class="flex items-center gap-2">
      <img alt="Solut Enerji Logo" class="h-8 w-auto" src="/assets/logo.png">
      <span class="text-xl font-bold tracking-tighter text-blue-900">Solut Enerji</span>
    </a>
    <a href="/iletisim/" class="bg-primary text-on-primary px-6 py-2.5 rounded-md font-semibold text-sm hover:opacity-80 transition-all">Teklif Al</a>
  </div>
  <div class="bg-slate-100 h-[1px] w-full"></div>
</nav>

<!-- 404 Content -->
<div class="min-h-screen flex items-center justify-center pt-20 px-6">
  <div class="text-center max-w-lg">
    <div class="kinetic-monolith-gradient w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-8">
      <span class="material-symbols-outlined text-secondary-container text-5xl">error</span>
    </div>
    <h1 class="font-headline text-6xl font-black text-primary mb-4">404</h1>
    <h2 class="font-headline text-2xl font-bold text-primary mb-4">Sayfa Bulunamadı</h2>
    <p class="text-on-surface-variant text-lg leading-relaxed mb-10">
      Aradığınız sayfa taşınmış veya kaldırılmış olabilir. Ana sayfaya dönerek devam edebilirsiniz.
    </p>
    <div class="flex flex-col sm:flex-row gap-4 justify-center">
      <a href="/" class="bg-primary text-on-primary px-8 py-4 rounded-md font-bold hover:opacity-80 transition-all flex items-center justify-center gap-2">
        <span class="material-symbols-outlined">home</span>
        <span>Ana Sayfaya Dön</span>
      </a>
      <a href="/iletisim/" class="bg-secondary-container text-on-secondary-fixed px-8 py-4 rounded-md font-bold hover:opacity-90 transition-all">
        Bize Ulaşın
      </a>
    </div>
  </div>
</div>

<!-- Footer -->
<footer class="w-full py-8 px-6 bg-blue-950 border-t border-blue-900">
  <div class="flex justify-center max-w-7xl mx-auto">
    <p class="text-xs text-slate-400">© 2025 Solut Enerji Mühendislik. Tüm hakları saklıdır.</p>
  </div>
</footer>

</body>
</html>
